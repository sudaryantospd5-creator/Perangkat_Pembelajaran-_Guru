        window.onload = function() {

            const savedState = localStorage.getItem("adm_guru_state");
            if (savedState) {
                try {
                    const parsed = JSON.parse(savedState);
                    // Merge saved state to keep structures up-to-date
                    appState = { ...appState, ...parsed };
                } catch(e) {
                    console.error("Gagal load saved state", e);
                }
            }
            
            // Pastikan tanggal terpilih memiliki nilai default valid
            if (!appState.selectedAbsensiTanggal) {
                appState.selectedAbsensiTanggal = new Date().toISOString().split('T')[0];
            }
            
            // Inisialisasi visualisasi awal
            initAbsensiDanNilaiDefault();
            renderSidebar();
            navigateTo(appState.currentTab || 'dashboard');
            syncHeaderValues();
            lucide.createIcons();

        // SIMPAN STATE KE LOCALSTORAGE
        function saveState() {
            localStorage.setItem("adm_guru_state", JSON.stringify(appState));
        }

        // FORMAT BYTES UTILITY
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = 1;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // INIT DEFAULT ABSENSI & NILAI JIKA BELUM ADA
        function initAbsensiDanNilaiDefault() {
            appState.dataSiswa.forEach(siswa => {
                if (!appState.nilaiSiswa[siswa.nisn]) {
                    appState.nilaiSiswa[siswa.nisn] = {
                        tugas: Array(10).fill(80),
                        uh: [85, 80],
                        projek: 85,
                        semester: 80
                    };
                }
            });
            // Absensi default untuk tanggal hari ini jika kosong
            const hariIni = new Date().toISOString().split('T')[0];
            if (!appState.daftarHadir[hariIni]) {
                appState.daftarHadir[hariIni] = {};
                appState.dataSiswa.forEach(siswa => {
                    appState.daftarHadir[hariIni][siswa.nisn] = 'H'; // Default: Hadir
                });
            }
        }

            document.getElementById('header-guru-nip').innerText = `NIP. ${appState.profil.guruNip}`;
            
            const avatarContainer = document.getElementById('guru-avatar-container');
            if (avatarContainer) {
                if (appState.profil.fotoGuruUrl) {
                    avatarContainer.innerHTML = `<img src="${appState.profil.fotoGuruUrl}" class="w-full h-full object-cover" />`;
                } else {
                    avatarContainer.innerHTML = `<span id="guru-initial">${appState.profil.guruNama.substring(0, 1)}</span>`;
                }
            }
            
            const logoPreview = document.getElementById('logo-preview');
            if (appState.profil.logoUrl) {
                logoPreview.innerHTML = `<img src="${appState.profil.logoUrl}" class="w-full h-full object-cover" />`;
            } else {
                logoPreview.innerHTML = `<i data-lucide="school" class="w-8 h-8 text-emerald-600"></i>`;

            }
        }

        function renderSidebar() {

                const isActive = appState.currentTab === item.id;
                
                let activeClasses = "";
                let iconWrapperClass = "";
                let labelClass = "";
                
                // Ekstraksi warna dasar dari text color
                const baseColor = item.textColor.replace('text-', '');
                
                if (isActive) {
                    if (item.isSpecial) {
                        // Desain Khusus Asisten AI
                        activeClasses = `${item.activeBg} text-emerald-400 border-l-4 font-extrabold shadow-inner scale-[1.02]`;

                    } else {
                        // Active State Warna-Warni
                        activeClasses = `${item.activeBg} ${item.textColor} border-l-4 font-bold shadow-sm translate-x-1`;
                        iconWrapperClass = `bg-${baseColor.split(' ')[0]}/10 ${item.textColor} scale-110`;
                        labelClass = `${item.textColor} font-bold`;

                } else {
                    // Inactive State dengan Warna Tulisan Senada yang Elegan (Warna-Warni Halus)

        // TOAST NOTIFIKASI
        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const bgClass = type === 'success' ? 'bg-emerald-600' : (type === 'info' ? 'bg-indigo-600' : 'bg-rose-600');
            const icon = type === 'success' ? 'check-circle' : (type === 'info' ? 'info' : 'alert-circle');
            
            const toast = document.createElement('div');
            toast.className = `${bgClass} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-semibold pointer-events-auto transform translate-y-5 opacity-0 transition-all duration-300 max-w-sm`;
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-5 h-5 shrink-0"></i>
                <p class="flex-1">${message}</p>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            // Animate In
            setTimeout(() => {
                toast.classList.remove('translate-y-5', 'opacity-0');
            }, 50);

            // Animate Out & Remove
            setTimeout(() => {
                toast.classList.add('translate-y-5', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 4000);
        }

        // MEMPROSES UNGGAHAN BERKAS ASLI (MEMBACA TYPE & PERSIST DATA)
        function handleItemFileUpload(event, section, index) {
            const file = event.target.files[0];
            if (file) {
                // Buat Object URL instan agar bisa dibaca langsung tanpa lag kompresi
                const objectUrl = URL.createObjectURL(file);
                window.fileObjectURLs = window.fileObjectURLs || {};
                window.fileObjectURLs[`${section}-${index}`] = objectUrl;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result;
                    const sizeFormatted = formatBytes(file.size);

                    let item;
                    if (section === 'capaianPembelajaran') item = appState.capaianPembelajaran[index];
                    else if (section === 'prota') item = appState.prota[index];
                    else if (section === 'promes') item = appState.promes[index];
                    else if (section === 'modul-ajar') item = appState.modulAjar[index];
                    else if (section === 'lkpd') item = appState.lkpd[index];
                    else if (section === 'kktp') item = appState.kktp[index];
                    else if (section === 'kisikisi') item = appState.kisikisi[index];

                    if (item) {
                        if (section === 'modul-ajar') {
                            item.file = file.name;
                        } else {
                            item.fileName = file.name;
                        }
                        item.fileType = file.type;
                        item.fileSize = sizeFormatted;
                        item.driveUrl = ""; // Reset jika diunggah lokal
                        
                        // Proteksi penyimpanan localstorage (Max limit 5MB)
                        // Hanya persist base64 data jika ukuran berkas di bawah 1.5MB
                        if (file.size < 1.5 * 1024 * 1024) {
                            item.fileData = base64Data;
                        } else {
                            item.fileData = ""; // Di atas 1.5MB hanya akan aktif selama sesi aktif tab browser
                            showToast(`Berkas berukuran besar (${sizeFormatted}) disimpan pada memori sesi aktif.`, "info");
                        }
                        
                        saveState();
                        navigateTo(appState.currentTab);
                        showToast(`Berkas "${file.name}" (${sizeFormatted}) berhasil diunggah!`);
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        function deleteItemFile(section, index) {
            let item;
            if (section === 'capaianPembelajaran') item = appState.capaianPembelajaran[index];
            else if (section === 'prota') item = appState.prota[index];
            else if (section === 'promes') item = appState.promes[index];
            else if (section === 'modul-ajar') item = appState.modulAjar[index];
            else if (section === 'lkpd') item = appState.lkpd[index];
            else if (section === 'kktp') item = appState.kktp[index];
            else if (section === 'kisikisi') item = appState.kisikisi[index];

            if (item) {
                if (section === 'modul-ajar') item.file = "";
                else item.fileName = "";
                
                item.fileType = "";
                item.fileSize = "";
                item.fileData = "";
                item.driveUrl = "";
            }
            
            if (window.fileObjectURLs && window.fileObjectURLs[`${section}-${index}`]) {
                delete window.fileObjectURLs[`${section}-${index}`];
            }

            saveState();
            navigateTo(appState.currentTab);
            showToast("Tautan berkas berhasil dihapus");
        }

            const paper = document.getElementById('preview-paper-content');

                    paper.innerHTML = `

                } else if (fileType.startsWith('text/') || fileType.includes('csv')) {
                    paper.className = "bg-slate-900 p-8 w-[21cm] min-h-[29.7cm] text-slate-100 rounded-lg shadow-2xl text-left transition-transform duration-200";

        function generatePreviewDocument(section, index) {
            let item;
            if (section === 'capaianPembelajaran') item = appState.capaianPembelajaran[index];
            else if (section === 'prota') item = appState.prota[index];
            else if (section === 'promes') item = appState.promes[index];
            else if (section === 'modul-ajar') item = appState.modulAjar[index];
            else if (section === 'lkpd') item = appState.lkpd[index];
            else if (section === 'kktp') item = appState.kktp[index];
            else if (section === 'kisikisi') item = appState.kisikisi[index];

            if (!item) return;

            const name = item.fileName || item.file;
            const type = item.fileType;
            const driveUrl = item.driveUrl || "";
            
            // Jika link Google Drive, redirect/buka di tab baru
            if (driveUrl) {
                window.open(driveUrl, '_blank');
                return;
            }

            // Ambil Object URL memori jika ada, atau fallback ke data base64 tersimpan
            const sessionUrl = window.fileObjectURLs ? window.fileObjectURLs[`${section}-${index}`] : null;
            const activeDataUrl = sessionUrl || item.fileData;

            // Jika ada berkas asli terdeteksi, buka viewer berkas asli
            if (activeDataUrl && type) {
                openPreviewModal(name, "", true, activeDataUrl, type);
                return;
            }

            // FALLBACK: Gunakan template simulasi dokumen resmi jika berkas tidak diunggah / hanya mock up text
            let kopSurat = `
                <div class="flex items-center justify-between border-b-4 border-double border-slate-900 pb-4 mb-8 text-black text-left">
                    <div class="w-16 h-16 flex-shrink-0 bg-slate-100 rounded-full flex items-center justify-center border overflow-hidden">
                        ${appState.profil.logoUrl ? `<img src="${appState.profil.logoUrl}" class="w-full h-full object-contain">` : `<div class="w-full h-full bg-slate-200 rounded-full flex items-center justify-center"><i data-lucide="school" class="w-8 h-8 text-slate-700"></i></div>`}
                    </div>
                    <div class="text-center flex-1 mx-4">

        // SIMULASI IMPOR FILE EXCEL
        function importSiswa(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split("\n");
                let importedCount = 0;

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;
                    const cols = line.split(",");
                    if (cols.length >= 3) {
                        const nisn = cols[0].trim().replace(/"/g, '');
                        const nama = cols[1].trim().replace(/"/g, '');
                        const kelas = cols[2].trim().replace(/"/g, '');
                        const jkel = cols[3] ? cols[3].trim().toUpperCase().replace(/"/g, '') : 'L';
                        
                        const kelasExists = appState.dataKelas.some(k => k.id === kelas);
                        
                        if (nisn && nama) {
                            appState.dataSiswa = appState.dataSiswa.filter(s => s.nisn !== nisn);
                            appState.dataSiswa.push({
                                nisn,
                                nama,
                                kelas: kelasExists ? kelas : (appState.dataKelas[0]?.id || 'Umum'),
                                jkel: (jkel === 'P' || jkel === 'PEREMPUAN') ? 'P' : 'L'
                            });
                            importedCount++;
                        }
                    }
                }

                saveState();
                initAbsensiDanNilaiDefault();
                navigateTo('data-siswa');
                showToast(`Berhasil mengimpor ${importedCount} siswa dari berkas.`);
            };
            reader.readAsText(file);
        }

        // DOWNLOAD SIMULATIVE EXCEL FORMAT
        function downloadFormatExcel() {
            const csvContent = "data:text/csv;charset=utf-8,NISN,NamaLengkap,Kelas,JenisKelamin\n123456789,Andi Wijaya,X-A,L\n987654321,Rini Setyowati,X-B,P";
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "format_impor_siswa.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Format unduhan berhasil disiapkan!");
        }

        function updateNilai(nisn, tipe, indeks, value) {
            const valNum = parseInt(value) || 0;
            if(!appState.nilaiSiswa[nisn]) {
                appState.nilaiSiswa[nisn] = { tugas: Array(10).fill(0), uh: [0,0], projek: 0, semester: 0 };
            }
            
            if (tipe === 'tugas') {
                appState.nilaiSiswa[nisn].tugas[indeks] = valNum;
            } else if (tipe === 'uh') {
                appState.nilaiSiswa[nisn].uh[indeks] = valNum;
            } else if (tipe === 'projek') {
                appState.nilaiSiswa[nisn].projek = valNum;
            } else if (tipe === 'semester') {
                appState.nilaiSiswa[nisn].semester = valNum;
            }
            
            // Hitung Ulang Nilai Rapor secara Realtime & perbarui DOM secara instan agar kursor fokus tidak terganggu
            const n = appState.nilaiSiswa[nisn];
            const avgTugas = n.tugas.reduce((a, b) => a + b, 0) / 10;
            const avgUH = n.uh.reduce((a, b) => a + b, 0) / 2;
            const rapor = Math.round((avgTugas * 0.3) + (avgUH * 0.3) + (n.projek * 0.2) + (n.semester * 0.2));

            const raporCell = document.getElementById(`rapor-${nisn}`);
            if (raporCell) {
                raporCell.innerText = rapor;
                
                // Berikan efek visual perubahan halus pada kolom nilai rapor
                raporCell.classList.add('text-emerald-500', 'scale-105');
                setTimeout(() => {
                    raporCell.classList.remove('text-emerald-500', 'scale-105');
                }, 400);
            }
        }

        // INTEGRATION WITH GEMINI 2.5 FLASH PREVIEW (09-2025)
        async function sendToAi() {
            const inputField = document.getElementById('ai-input');
            const query = inputField.value.trim();
            if (!query) return;

            const chatOutput = document.getElementById('ai-chat-output');
            
            // Append User Chat
            chatOutput.innerHTML += `
                <div class="flex gap-3 max-w-2xl bg-slate-100 p-3.5 rounded-xl ml-auto text-right">
                    <div class="text-sm space-y-1 text-slate-700 w-full">
                        <p class="font-semibold text-slate-800">Anda</p>
                        <p>${query}</p>
                    </div>
                </div>
            `;
            chatOutput.scrollTop = chatOutput.scrollHeight;
            inputField.value = "";

            // Append Loading Indicator
            const loadId = 'ai-loading-' + Date.now();
            chatOutput.innerHTML += `
                <div id="${loadId}" class="flex gap-3 max-w-2xl bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm">
                    <div class="w-8 h-8 rounded-full bg-slate-300 animate-pulse text-white flex items-center justify-center shrink-0"><i data-lucide="sparkles" class="w-4 h-4"></i></div>
                    <div class="text-sm text-slate-400 italic flex items-center gap-2">
                        <span class="animate-bounce">.</span><span class="animate-bounce delay-100">.</span><span class="animate-bounce delay-200">.</span> AI sedang memikirkan susunan bahan ajar terbaik...
                    </div>
                </div>
            `;
            chatOutput.scrollTop = chatOutput.scrollHeight;

            // API REQUEST TO GEMINI 2.5 FLASH PREVIEW WITH BACKOFF RETRYS
            const systemPrompt = `Anda adalah asisten AI guru pendamping profesional Indonesia. Bantu guru menyusun perangkat ajar (Modul ajar/RPP, LKPD, kisi-kisi, evaluasi kurikulum merdeka) dengan kreatif, ringkas, berbobot, struktur rapi dan berbasis keilmuan yang valid.`;
            
            let attempts = 0;
            const maxAttempts = 5;
            let success = false;
            let aiTextResponse = "";

            while (attempts < maxAttempts && !success) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        aiTextResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, tidak ada respon yang dapat dihasilkan.";
                        success = true;
                    } else {
                        throw new Error(`API Error Status: ${response.status}`);
                    }
                } catch (e) {
                    attempts++;
                    const delay = Math.pow(2, attempts) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }

            // Remove loading indicator
            const loadElem = document.getElementById(loadId);
            if (loadElem) loadElem.remove();

            if (!success) {
                aiTextResponse = "Koneksi ke server AI mengalami gangguan. Pastikan Anda terhubung ke internet dan coba kembali beberapa saat lagi.";
            }

            // Format markdown minimal secara aman
            const formattedRes = aiTextResponse.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Render Response
            chatOutput.innerHTML += `
                <div class="flex gap-3 max-w-2xl bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm">
                    <div class="w-8 h-8 rounded-full bg-emerald-600 text-white flex items-center justify-center font-bold text-sm shrink-0"><i data-lucide="sparkles" class="w-4 h-4"></i></div>
                    <div class="text-sm space-y-1 text-slate-700 leading-relaxed">
                        <p class="font-semibold text-slate-800">Asisten AI Guru</p>
                        <p>${formattedRes}</p>
                    </div>
                </div>
            `;
            chatOutput.scrollTop = chatOutput.scrollHeight;
            lucide.createIcons();
        }
